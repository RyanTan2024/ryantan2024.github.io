<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="谭燃 Ryan Tan 的个人主页，记录成长点滴">
    <title>谭燃 Ryan Tan</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>谭燃 (Ryan TAN)</h1>
            </div>
        </div>
    </header>
    
    <main>
        <section id="journal" class="journal-section">
            <div class="container">
                <h2 class="section-title"></h2>
                <div class="journal-container" id="journal-container">
                    <!-- 动态生成的日记内容 -->
                </div>
            </div>
        </section>
    </main>
    
    <footer>
        <div class="container">
            <div class="footer-bottom">
                <div id="clustrmap-container" style="width: 80px; overflow: hidden; margin: auto; transition: none;">
                </div>
                <p>&copy; 谭燃 (Ryan Tan)</p>
            </div>
        </div>
    </footer>
    
    <!-- 照片放大模态框 -->
    <div id="photo-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <img id="modal-img" src="" alt="">
        </div>
    </div>
    
    <script>
        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
        
        // 加载日记数据
        function loadJournalData() {
            console.log('开始加载日记数据...');
            
            // 直接硬编码JSON数据
            const data = [
                {
                    "date": "2025-10-01",
                    "title": "我在济南芦南村",
                    "photo": "photos/20251001.jpg"
                },{
                    "date": "2024-07-25",
                    "title": "我出生了",
                    "photo": "photos/20240725.jpg"
                }
            ];
            
            console.log('数据加载成功:', data);
            
            // 按日期降序排序，最新的在前面
            data.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            renderJournalItems(data);
        }
        
        // 渲染日记项目
        function renderJournalItems(items) {
            const container = document.getElementById('journal-container');
            container.innerHTML = '';
            
            items.forEach(item => {
                const journalItem = document.createElement('div');
                journalItem.className = 'journal-item';
                
                // 日期 - 显示为MM/YYYY格式
                const date = new Date(item.date);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const formattedDate = `${month}/${year}`;
                const dateHTML = `
                    <div class="journal-header">
                        <div class="journal-date">${formattedDate}</div>
                    </div>
                `;
                
                // 内容 - 使用title字段
                const contentHTML = `
                    <div class="journal-content">
                        <p>${item.title}</p>
                    </div>
                `;
                
                // 照片 - 使用title字段作为alt和caption
                let photosHTML = '';
                if (item.photo) {
                    photosHTML = '<div class="journal-gallery">';
                    // 尝试多种图片路径格式
                    const photoPath = item.photo;
                    photosHTML += `
                        <div class="gallery-item" onclick="openPhotoModal('${photoPath}', '${item.title}')">
                            <img src="${photoPath}" alt="${item.title}">
                        </div>
                    `;
                    photosHTML += '</div>';
                }
                // 兼容旧格式（photos数组）
                else if (item.photos && item.photos.length > 0) {
                    photosHTML = '<div class="journal-gallery">';
                    item.photos.forEach(photo => {
                        const photoSrc = photo.src || photo;
                        photosHTML += `
                            <div class="gallery-item" onclick="openPhotoModal('${photoSrc}', '${item.title}')">
                                <img src="${photoSrc}" alt="${item.title}">
                            </div>
                        `;
                    });
                    photosHTML += '</div>';
                }
                
                journalItem.innerHTML = dateHTML + contentHTML + photosHTML;
                container.appendChild(journalItem);
            });
            
            // 触发图片加载动画
            setTimeout(() => {
                const images = document.querySelectorAll('img');
                images.forEach(img => {
                    img.classList.add('loaded');
                });
            }, 100);
        }
        
        // 动态加载clustrmaps脚本
        function loadClustrmaps() {
            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.id = 'clstr_globe';
            script.src = '//clustrmaps.com/globe.js?d=36XM6SUwMq187cRMN1Rp0rZwVquvjcxOtq7lv2iecm4';
            script.async = true;
            document.getElementById('clustrmap-container').appendChild(script);
        }
        
        // 全局照片放大函数
        function openPhotoModal(src, alt) {
            const modal = document.getElementById('photo-modal');
            const modalImg = document.getElementById('modal-img');
            console.log('Opening photo modal:', src);
            modal.style.display = 'block';
            modalImg.src = src;
            modalImg.alt = alt;
        }
        
        // 照片放大功能
        function setupPhotoModal() {
            const modal = document.getElementById('photo-modal');
            
            console.log('Photo modal setup started');
            console.log('Modal element:', modal);
            
            // 关闭模态框
            const closeBtn = document.querySelector('.close');
            if (closeBtn) {
                closeBtn.addEventListener('click', function() {
                    console.log('Close button clicked');
                    modal.style.display = 'none';
                });
            }
            
            // 点击模态框外部关闭
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    console.log('Modal background clicked');
                    modal.style.display = 'none';
                }
            });
            
            // 按ESC键关闭
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modal.style.display === 'block') {
                    console.log('Escape key pressed');
                    modal.style.display = 'none';
                }
            });
        }
        
        // 页面加载时加载数据
        window.addEventListener('load', function() {
            loadJournalData();
            // 延迟加载clustrmaps，避免与其他资源竞争
            setTimeout(loadClustrmaps, 1000);
            // 设置照片放大功能
            setupPhotoModal();
        });
    </script>
</body>
</html>
