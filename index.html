<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="谭燃 Ryan Tan 的个人主页，记录成长点滴">
    <title>谭燃 Ryan Tan</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>谭燃 (Ryan TAN)</h1>
            </div>
        </div>
    </header>
    
    <main>
        <section id="journal" class="journal-section">
            <div class="container">
                <h2 class="section-title"></h2>
                <div class="journal-container" id="journal-container">
                    <!-- 动态生成的日记内容 -->
                </div>
            </div>
        </section>
    </main>
    
    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 谭燃 Ryan Tan</p>
            </div>
        </div>
    </footer>
    
    <script>
        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
        
        // 加载日记数据
        async function loadJournalData() {
            try {
                const response = await fetch('journal.json');
                if (!response.ok) {
                    throw new Error('Failed to load journal data');
                }
                const data = await response.json();
                
                // 按日期降序排序，最新的在前面
                data.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                renderJournalItems(data);
            } catch (error) {
                console.error('Error loading journal data:', error);
                document.getElementById('journal-container').innerHTML = '<p>加载日记数据失败</p>';
            }
        }
        
        // 渲染日记项目
        function renderJournalItems(items) {
            const container = document.getElementById('journal-container');
            container.innerHTML = '';
            
            items.forEach(item => {
                const journalItem = document.createElement('div');
                journalItem.className = 'journal-item';
                
                // 日期 - 只显示年和月
                const date = new Date(item.date);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const formattedDate = `${year}-${month}`;
                const dateHTML = `
                    <div class="journal-header">
                        <div class="journal-date">${formattedDate}</div>
                    </div>
                `;
                
                // 内容
                const contentHTML = `
                    <div class="journal-content">
                        <p>${item.content}</p>
                    </div>
                `;
                
                // 照片
                let photosHTML = '';
                if (item.photos && item.photos.length > 0) {
                    photosHTML = '<div class="journal-gallery">';
                    item.photos.forEach(photo => {
                        photosHTML += `
                            <div class="gallery-item">
                                <img src="${photo.src}" alt="${photo.alt}">
                                <div class="gallery-overlay">
                                    <div class="gallery-caption">${photo.caption}</div>
                                </div>
                            </div>
                        `;
                    });
                    photosHTML += '</div>';
                }
                
                journalItem.innerHTML = dateHTML + contentHTML + photosHTML;
                container.appendChild(journalItem);
            });
            
            // 触发图片加载动画
            setTimeout(() => {
                const images = document.querySelectorAll('img');
                images.forEach(img => {
                    img.classList.add('loaded');
                });
            }, 100);
        }
        
        // 页面加载时加载数据
        window.addEventListener('load', function() {
            loadJournalData();
        });
    </script>
</body>
</html>
