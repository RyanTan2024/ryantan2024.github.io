<!DOCTYPE html>
<html lang="zh-CN" class="index-page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="谭燃 Ryan Tan 的个人主页，记录成长点滴">
    <title>谭燃 Ryan Tan</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/hero-title.js" defer></script>
</head>
<body class="index-page">
    <header class="hero">
        <div class="container">
            <div class="hero-content">
                <div class="hero-title-wrap">
                    <h1 class="hero-title">谭燃 (Ryan TAN)</h1>
                </div>
                <nav class="nav">
                    <ul>
                        <li><a href="index.html" class="active">相册</a></li>
                        <li><a href="foot.html">足迹</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    
    <main>
        <section id="journal" class="journal-section">
            <div class="container">
                <h2 class="section-title"></h2>
                <div class="journal-container" id="journal-container">
                    <!-- 动态生成的日记内容 -->
                </div>
            </div>
        </section>
    </main>
    
    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 谭燃 (Ryan Tan)</p>
            </div>
        </div>
    </footer>
    
    <!-- 照片放大模态框 -->
    <div id="photo-modal" class="modal">
        <div class="modal-content">
            <img id="modal-img" src="" alt="">
        </div>
    </div>
    
    <script>
        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
        
        // 加载日记数据
        function loadJournalData() {
            console.log('开始加载日记数据...');
            
            // 从 JSON 文件加载数据
            fetch('journal-data.json')
                .then(response => response.json())
                .then(data => {
                    window.journalData = data;
                    console.log('数据加载成功:', window.journalData);
                    
                    // 按日期降序排序，最新的在前面
                    window.journalData.sort((a, b) => {
                        // 确保日期格式一致，使用YYYY-MM-DD格式进行比较
                        const dateA = a.date.replace(/\//g, '-');
                        const dateB = b.date.replace(/\//g, '-');
                        return new Date(dateB) - new Date(dateA);
                    });
                    
                    // 渐进式加载日记
                    progressiveLoad(window.journalData);
                })
                .catch(error => {
                    console.error('加载日记数据失败:', error);
                });
        }
        
        // 一次性加载全部日记，避免网格反复重排导致页面左右抖动
        function progressiveLoad(items) {
            const container = document.getElementById('journal-container');
            container.innerHTML = '';

            items.forEach(item => {
                renderJournalItem(item);
            });

            lazyLoadImages();
        }
        
        // 渲染单个日记项目
        function renderJournalItem(item) {
            const container = document.getElementById('journal-container');
            const journalItem = document.createElement('div');
            let itemClass = 'journal-item';
            
            // 根据照片数量设置不同的类名
            if (item.photos && item.photos.length === 3) {
                itemClass += ' journal-item-wide-3';
            } else if (item.photos && item.photos.length === 2) {
                itemClass += ' journal-item-wide-2';
            } else if (item.photos && item.photos.length === 4) {
                itemClass += ' journal-item-wide-4';
            }
            
            journalItem.className = itemClass;
            
            // 日期 - 显示为MM/YYYY格式
            const date = new Date(item.date);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const formattedDate = `${month}/${year}`;
            const dateHTML = `
                <div class="journal-header">
                    <div class="journal-date">${formattedDate}</div>
                </div>
            `;
            
            // 内容 - 使用title字段
            const contentHTML = `
                <div class="journal-content">
                    <p>${item.title}</p>
                </div>
            `;
            
            // 照片 - 使用title字段作为alt和caption
            let photosHTML = '';
            if (item.photo) {
                photosHTML = '<div class="journal-gallery">';
                // 尝试多种图片路径格式
                const photoPath = item.photo;
                photosHTML += `
                    <div class="gallery-item" onclick="openPhotoModal('${photoPath}', '${item.title}')">
                        <img data-src="${photoPath}" alt="${item.title}" class="lazy-load" decoding="async">
                    </div>
                `;
                photosHTML += '</div>';
            }
            // 兼容旧格式（photos数组）
            else if (item.photos && item.photos.length > 0) {
                photosHTML = '<div class="journal-gallery">';
                item.photos.forEach(photo => {
                    const photoSrc = photo.src || photo;
                    photosHTML += `
                        <div class="gallery-item" onclick="openPhotoModal('${photoSrc}', '${item.title}')">
                            <img data-src="${photoSrc}" alt="${item.title}" class="lazy-load" decoding="async">
                        </div>
                    `;
                });
                photosHTML += '</div>';
            }
            
            journalItem.innerHTML = dateHTML + contentHTML + photosHTML;
            container.appendChild(journalItem);
        }
        
        // 懒加载图片
        function lazyLoadImages() {
            const lazyImages = document.querySelectorAll('.lazy-load');

            lazyImages.forEach(img => {
                const rect = img.getBoundingClientRect();
                const windowHeight = window.innerHeight || document.documentElement.clientHeight;

                if (rect.top <= windowHeight + 200 && rect.bottom >= -200) {
                    img.src = img.dataset.src;
                    img.classList.remove('lazy-load');
                    img.classList.add('loaded');
                }
            });
        }

        window.addEventListener('scroll', lazyLoadImages, { passive: true });

        // 全局照片放大函数
        function openPhotoModal(src, alt) {
            const modal = document.getElementById('photo-modal');
            const modalImg = document.getElementById('modal-img');
            console.log('Opening photo modal:', src);
            modal.classList.add('show');
            modalImg.src = src;
            modalImg.alt = alt;
        }
        
        // 照片放大功能
        function setupPhotoModal() {
            const modal = document.getElementById('photo-modal');
            
            console.log('Photo modal setup started');
            console.log('Modal element:', modal);
            
            // 点击模态框任意位置关闭
            modal.addEventListener('click', function() {
                console.log('Modal clicked');
                modal.classList.remove('show');
            });
            
            // 按ESC键关闭
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modal.classList.contains('show')) {
                    console.log('Escape key pressed');
                    modal.classList.remove('show');
                }
            });
        }
        
        // DOM 就绪后立即加载相册，不等待第三方统计脚本
        document.addEventListener('DOMContentLoaded', function() {
            loadJournalData();
            setupPhotoModal();
        });

        // 浏览器空闲时再加载统计脚本，并放入隐藏容器
        function loadThirdPartyScripts() {
            var _hmt = _hmt || [];
            (function() {
                var hm = document.createElement('script');
                hm.src = 'https://hm.baidu.com/hm.js?55e1f638993b24277edb605f248391f2';
                document.head.appendChild(hm);
            })();

            var sandbox = document.createElement('div');
            sandbox.setAttribute('aria-hidden', 'true');
            sandbox.style.cssText = 'position:fixed;left:0;top:0;width:0;height:0;overflow:hidden;visibility:hidden;pointer-events:none;';
            var clstr = document.createElement('script');
            clstr.id = 'clstr_globe';
            clstr.src = '//clustrmaps.com/globe.js?d=36XM6SUwMq187cRMN1Rp0rZwVquvjcxOtq7lv2iecm4';
            sandbox.appendChild(clstr);
            document.body.appendChild(sandbox);
        }

        if ('requestIdleCallback' in window) {
            requestIdleCallback(loadThirdPartyScripts, { timeout: 8000 });
        } else {
            window.addEventListener('load', function() {
                setTimeout(loadThirdPartyScripts, 5000);
            });
        }
    </script>
</body>
</html>
