<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="谭燃 Ryan Tan 的个人主页，记录成长点滴">
    <title>谭燃 Ryan Tan</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>谭燃 (Ryan TAN)</h1>
            </div>
        </div>
    </header>
    
    <main>
        <section id="journal" class="journal-section">
            <div class="container">
                <h2 class="section-title"></h2>
                <div class="journal-container" id="journal-container">
                    <!-- 动态生成的日记内容 -->
                </div>
            </div>
        </section>
    </main>
    
    <footer>
        <div class="container">
            <div class="footer-bottom">
                <div id="clustrmap-container" style="width: 80px; overflow: hidden; margin: auto; transition: none;">
                </div>
                <p>&copy; 2026 谭燃 Ryan Tan</p>
            </div>
        </div>
    </footer>
    
    <script>
        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
        
        // 加载日记数据
        async function loadJournalData() {
            try {
                console.log('开始加载journal.json...');
                console.log('当前页面URL:', window.location.href);
                
                // 尝试不同的路径
                const paths = ['journal.json', './journal.json', '/' + window.location.pathname.split('/')[1] + '/journal.json'];
                let data = null;
                
                for (const path of paths) {
                    try {
                        console.log('尝试路径:', path);
                        const response = await fetch(path);
                        console.log('HTTP状态:', response.status);
                        
                        if (response.ok) {
                            data = await response.json();
                            console.log('成功加载JSON数据:', data);
                            break;
                        }
                    } catch (pathError) {
                        console.log('路径尝试失败:', path, pathError.message);
                    }
                }
                
                if (!data) {
                    throw new Error('所有路径尝试均失败');
                }
                
                // 按日期降序排序，最新的在前面
                data.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                renderJournalItems(data);
            } catch (error) {
                console.error('加载日记数据失败:', error);
                document.getElementById('journal-container').innerHTML = `
                    <p style="text-align: center; color: #95a5a6;">加载失败，请检查浏览器控制台获取详细信息</p>
                    <p style="text-align: center; font-size: 0.8rem; color: #95a5a6;">Error: ${error.message}</p>
                    <p style="text-align: center; font-size: 0.8rem; color: #95a5a6;">请确保journal.json文件存在且格式正确</p>
                    <p style="text-align: center; font-size: 0.8rem; color: #95a5a6;">当前页面: ${window.location.href}</p>
                `;
            }
        }
        
        // 渲染日记项目
        function renderJournalItems(items) {
            const container = document.getElementById('journal-container');
            container.innerHTML = '';
            
            items.forEach(item => {
                const journalItem = document.createElement('div');
                journalItem.className = 'journal-item';
                
                // 日期 - 只显示年和月
                const date = new Date(item.date);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const formattedDate = `${year}-${month}`;
                const dateHTML = `
                    <div class="journal-header">
                        <div class="journal-date">${formattedDate}</div>
                    </div>
                `;
                
                // 内容 - 使用title字段
                const contentHTML = `
                    <div class="journal-content">
                        <p>${item.title}</p>
                    </div>
                `;
                
                // 照片 - 使用title字段作为alt和caption
                let photosHTML = '';
                if (item.photos && item.photos.length > 0) {
                    photosHTML = '<div class="journal-gallery">';
                    item.photos.forEach(photo => {
                        photosHTML += `
                            <div class="gallery-item">
                                <img src="${photo.src}" alt="${item.title}">
                                <div class="gallery-overlay">
                                    <div class="gallery-caption">${item.title}</div>
                                </div>
                            </div>
                        `;
                    });
                    photosHTML += '</div>';
                }
                
                journalItem.innerHTML = dateHTML + contentHTML + photosHTML;
                container.appendChild(journalItem);
            });
            
            // 触发图片加载动画
            setTimeout(() => {
                const images = document.querySelectorAll('img');
                images.forEach(img => {
                    img.classList.add('loaded');
                });
            }, 100);
        }
        
        // 动态加载clustrmaps脚本
        function loadClustrmaps() {
            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.id = 'clstr_globe';
            script.src = '//clustrmaps.com/globe.js?d=36XM6SUwMq187cRMN1Rp0rZwVquvjcxOtq7lv2iecm4';
            script.async = true;
            document.getElementById('clustrmap-container').appendChild(script);
        }
        
        // 页面加载时加载数据
        window.addEventListener('load', function() {
            loadJournalData();
            // 延迟加载clustrmaps，避免与其他资源竞争
            setTimeout(loadClustrmaps, 1000);
        });
    </script>
</body>
</html>
