<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="谭燃 Ryan Tan 的个人主页，记录成长点滴">
    <title>谭燃 Ryan Tan</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="index-page">
    <header class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>谭燃 (Ryan TAN)</h1>
                <nav class="nav">
                    <ul>
                        <li><a href="index.html" class="active">相册</a></li>
                        <li><a href="foot.html">足迹</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    
    <main>
        <section id="journal" class="journal-section">
            <div class="container">
                <h2 class="section-title"></h2>
                <div class="journal-container" id="journal-container">
                    <!-- 动态生成的日记内容 -->
                </div>
            </div>
        </section>
    </main>
    
    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 谭燃 (Ryan Tan)</p>
            </div>
        </div>
    </footer>
    
    <!-- 照片放大模态框 -->
    <div id="photo-modal" class="modal">
        <div class="modal-content">
            <img id="modal-img" src="" alt="">
        </div>
    </div>
    
    <script>
        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
        
        // 加载日记数据
        function loadJournalData() {
            console.log('开始加载日记数据...');
            
            // 直接硬编码JSON数据
            window.journalData = [
                {
                    "date": "2026-04-11",
                    "title": "我在美里湖奥特莱斯",
                    "photos": [
                        "photos/20260412.jpg"
                    ]
                },{
                    "date": "2026-04-11",
                    "title": "我在济南明水古城",
                    "city": "济南市",
                    "photos": [
                        "photos/20260411.jpg",
                        "photos/20260411-1.jpg",
                        "photos/20260411-2.jpg"
                    ]
                },{
                    "date": "2025-10-01",
                    "title": "我在济南芦南村",
                    "photo": "photos/20251001.jpg"
                },{
                    "date": "2025-07-25",
                    "title": "我一岁了",
                    "photos": [
                        "photos/20250725.jpg",
                        "photos/20250725-1.jpg"
                    ]
                },{
                    "date": "2025-06-01",
                    "title": "我在济南园博园",
                    "photos": [
                        "photos/20250601.jpg"
                    ]
                },{
                    "date": "2025-02-11",
                    "title": "洗澡澡",
                    "photos": [
                        "photos/20250211.jpg",
                    ]
                },{
                    "date": "2024-11-11",
                    "title": "拍写真",
                    "photos": [
                        "photos/20241111.jpg",
                        "photos/20241111-1.jpg"
                    ]
                },{
                    "date": "2024-07-25",
                    "title": "我出生了",
                    "photos": [
                        "photos/20240725.jpg"
                    ]
                }
            ];
            
            console.log('数据加载成功:', window.journalData);
            
            // 按日期降序排序，最新的在前面
            window.journalData.sort((a, b) => {
                // 确保日期格式一致，使用YYYY-MM-DD格式进行比较
                const dateA = a.date.replace(/\//g, '-');
                const dateB = b.date.replace(/\//g, '-');
                return new Date(dateB) - new Date(dateA);
            });
            
            // 渐进式加载日记
            progressiveLoad(window.journalData);
        }
        
        // 渐进式加载日记
        function progressiveLoad(items) {
            const container = document.getElementById('journal-container');
            container.innerHTML = '';
            
            let currentIndex = 0;
            const batchSize = 1; // 每次加载2个事件
            
            function loadNextBatch() {
                if (currentIndex >= items.length) {
                    return;
                }
                
                const endIndex = Math.min(currentIndex + batchSize, items.length);
                const batchItems = items.slice(currentIndex, endIndex);
                
                batchItems.forEach(item => {
                    renderJournalItem(item);
                });
                
                currentIndex = endIndex;
                
                // 延迟加载下一批，给浏览器时间渲染
                setTimeout(loadNextBatch, 300);
            }
            
            // 开始加载第一批
            loadNextBatch();
        }
        
        // 渲染单个日记项目
        function renderJournalItem(item) {
            const container = document.getElementById('journal-container');
            const journalItem = document.createElement('div');
            let itemClass = 'journal-item';
            
            // 根据照片数量设置不同的类名
            if (item.photos && item.photos.length === 3) {
                itemClass += ' journal-item-wide-3';
            } else if (item.photos && item.photos.length === 2) {
                itemClass += ' journal-item-wide-2';
            } else if (item.photos && item.photos.length === 4) {
                itemClass += ' journal-item-wide-2';
            }
            
            journalItem.className = itemClass;
            
            // 日期 - 显示为MM/YYYY格式
            const date = new Date(item.date);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const formattedDate = `${month}/${year}`;
            const dateHTML = `
                <div class="journal-header">
                    <div class="journal-date">${formattedDate}</div>
                </div>
            `;
            
            // 内容 - 使用title字段
            const contentHTML = `
                <div class="journal-content">
                    <p>${item.title}</p>
                </div>
            `;
            
            // 照片 - 使用title字段作为alt和caption
            let photosHTML = '';
            if (item.photo) {
                photosHTML = '<div class="journal-gallery">';
                // 尝试多种图片路径格式
                const photoPath = item.photo;
                photosHTML += `
                    <div class="gallery-item" onclick="openPhotoModal('${photoPath}', '${item.title}')">
                        <img data-src="${photoPath}" alt="${item.title}" class="lazy-load">
                    </div>
                `;
                photosHTML += '</div>';
            }
            // 兼容旧格式（photos数组）
            else if (item.photos && item.photos.length > 0) {
                photosHTML = '<div class="journal-gallery">';
                item.photos.forEach(photo => {
                    const photoSrc = photo.src || photo;
                    photosHTML += `
                        <div class="gallery-item" onclick="openPhotoModal('${photoSrc}', '${item.title}')">
                            <img data-src="${photoSrc}" alt="${item.title}" class="lazy-load">
                        </div>
                    `;
                });
                photosHTML += '</div>';
            }
            
            journalItem.innerHTML = dateHTML + contentHTML + photosHTML;
            container.appendChild(journalItem);
            
            // 触发懒加载
            setTimeout(() => {
                lazyLoadImages();
            }, 100);
        }
        
        // 懒加载图片
        function lazyLoadImages() {
            const lazyImages = document.querySelectorAll('.lazy-load');
            
            lazyImages.forEach(img => {
                const rect = img.getBoundingClientRect();
                const windowHeight = window.innerHeight || document.documentElement.clientHeight;
                
                // 当图片进入视口时加载
                if (rect.top <= windowHeight && rect.bottom >= 0) {
                    console.log('Loading image:', img.dataset.src);
                    img.src = img.dataset.src;
                    img.classList.remove('lazy-load');
                    img.classList.add('loaded');
                }
            });
        }
        
        // 滚动时触发懒加载
        window.addEventListener('scroll', lazyLoadImages);
        
        
        
        // 全局照片放大函数
        function openPhotoModal(src, alt) {
            const modal = document.getElementById('photo-modal');
            const modalImg = document.getElementById('modal-img');
            console.log('Opening photo modal:', src);
            modal.classList.add('show');
            modalImg.src = src;
            modalImg.alt = alt;
        }
        
        // 照片放大功能
        function setupPhotoModal() {
            const modal = document.getElementById('photo-modal');
            
            console.log('Photo modal setup started');
            console.log('Modal element:', modal);
            
            // 点击模态框任意位置关闭
            modal.addEventListener('click', function() {
                console.log('Modal clicked');
                modal.classList.remove('show');
            });
            
            // 按ESC键关闭
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modal.classList.contains('show')) {
                    console.log('Escape key pressed');
                    modal.classList.remove('show');
                }
            });
        }
        
        // 页面加载时加载数据
        window.addEventListener('load', function() {
            loadJournalData();
            // 设置照片放大功能
            setupPhotoModal();
        });
    </script>
</body>
</html>
