<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="谭燃 Ryan Tan 的个人主页，记录成长点滴">
    <title>谭燃 Ryan Tan</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>谭燃 (Ryan TAN)</h1>
            </div>
        </div>
    </header>
    
    <main>
        <section id="journal" class="journal-section">
            <div class="container">
                <h2 class="section-title"></h2>
                <div class="journal-container" id="journal-container">
                    <!-- 动态生成的日记内容 -->
                </div>
            </div>
        </section>
    </main>
    
    <footer>
        <div class="container">
            <div class="footer-bottom">
                <div id="clustrmap-container" style="width: 80px; overflow: hidden; margin: auto; transition: none;">
                </div>
                <p>&copy; 谭燃 (Ryan Tan)</p>
            </div>
        </div>
    </footer>
    
    <!-- 照片放大模态框 -->
    <div id="photo-modal" class="modal">
        <div class="modal-content">
            <img id="modal-img" src="" alt="">
        </div>
    </div>
    
    <script>
        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
        
        // 加载日记数据
        function loadJournalData() {
            console.log('开始加载日记数据...');
            
            // 直接硬编码JSON数据
            const data = [
                {
                    "date": "2026-04-11",
                    "title": "我在济南明水古城",
                    "photos": [
                        "photos/20260411.jpg",
                        "photos/20260411-1.jpg",
                        "photos/20260411-2.jpg",
                    ]
                },{
                    "date": "2025-10-01",
                    "title": "我在济南芦南村",
                    "photo": "photos/20251001.jpg",
                },{
                    "date": "2025-07-25",
                    "title": "我一岁了",
                    "photos": [
                        "photos/20250725.jpg",
                        "photos/20250725-1.jpg",
                    ]
                },{
                    "date": "2024-07-25",
                    "title": "我出生了",
                    "photos": [
                        "photos/20240725.jpg"
                    ]
                }
            ];
            
            console.log('数据加载成功:', data);
            
            // 按日期降序排序，最新的在前面
            data.sort((a, b) => {
                // 确保日期格式一致，使用YYYY-MM-DD格式进行比较
                const dateA = a.date.replace(/\//g, '-');
                const dateB = b.date.replace(/\//g, '-');
                return new Date(dateB) - new Date(dateA);
            });
            
            renderJournalItems(data);
        }
        
        // 渲染日记项目
        function renderJournalItems(items) {
            const container = document.getElementById('journal-container');
            container.innerHTML = '';
            
            items.forEach(item => {
                const journalItem = document.createElement('div');
                let itemClass = 'journal-item';
                
                // 根据照片数量设置不同的类名
                if (item.photos && item.photos.length === 3) {
                    itemClass += ' journal-item-wide-3';
                } else if (item.photos && item.photos.length === 2) {
                    itemClass += ' journal-item-wide-2';
                } else if (item.photos && item.photos.length === 4) {
                    itemClass += ' journal-item-wide-2';
                }
                
                journalItem.className = itemClass;
                
                // 日期 - 显示为MM/YYYY格式
                const date = new Date(item.date);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const formattedDate = `${month}/${year}`;
                const dateHTML = `
                    <div class="journal-header">
                        <div class="journal-date">${formattedDate}</div>
                    </div>
                `;
                
                // 内容 - 使用title字段
                const contentHTML = `
                    <div class="journal-content">
                        <p>${item.title}</p>
                    </div>
                `;
                
                // 照片 - 使用title字段作为alt和caption
                let photosHTML = '';
                if (item.photo) {
                    photosHTML = '<div class="journal-gallery">';
                    // 尝试多种图片路径格式
                    const photoPath = item.photo;
                    photosHTML += `
                        <div class="gallery-item" onclick="openPhotoModal('${photoPath}', '${item.title}')">
                            <img src="${photoPath}" alt="${item.title}">
                        </div>
                    `;
                    photosHTML += '</div>';
                }
                // 兼容旧格式（photos数组）
                else if (item.photos && item.photos.length > 0) {
                    photosHTML = '<div class="journal-gallery">';
                    item.photos.forEach(photo => {
                        const photoSrc = photo.src || photo;
                        photosHTML += `
                            <div class="gallery-item" onclick="openPhotoModal('${photoSrc}', '${item.title}')">
                                <img src="${photoSrc}" alt="${item.title}">
                            </div>
                        `;
                    });
                    photosHTML += '</div>';
                }
                
                journalItem.innerHTML = dateHTML + contentHTML + photosHTML;
                container.appendChild(journalItem);
            });
            
            // 触发图片加载动画
            setTimeout(() => {
                const images = document.querySelectorAll('img');
                images.forEach(img => {
                    img.classList.add('loaded');
                });
            }, 100);
        }
        
        
        
        // 全局照片放大函数
        function openPhotoModal(src, alt) {
            const modal = document.getElementById('photo-modal');
            const modalImg = document.getElementById('modal-img');
            console.log('Opening photo modal:', src);
            modal.classList.add('show');
            modalImg.src = src;
            modalImg.alt = alt;
        }
        
        // 照片放大功能
        function setupPhotoModal() {
            const modal = document.getElementById('photo-modal');
            
            console.log('Photo modal setup started');
            console.log('Modal element:', modal);
            
            // 点击模态框任意位置关闭
            modal.addEventListener('click', function() {
                console.log('Modal clicked');
                modal.classList.remove('show');
            });
            
            // 按ESC键关闭
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modal.classList.contains('show')) {
                    console.log('Escape key pressed');
                    modal.classList.remove('show');
                }
            });
        }
        
        // 页面加载时加载数据
        window.addEventListener('load', function() {
            loadJournalData();
            // 设置照片放大功能
            setupPhotoModal();
        });
    </script>
</body>
</html>
